<div class="profile-container">

  <h2>👤 My Profile</h2>

  @if (message) {
    <p class="message">{{ message }}</p>
  }

  @if (profile && !editMode) {

    <div class="profile-card">

      <img
        [src]="profile.profileImage"
        class="profile-image" />

      <p><strong>Name:</strong> {{ profile.name }}</p>
      <p><strong>Email:</strong> {{ profile.email }}</p>
      <p><strong>Phone:</strong> {{ profile.phone }}</p>
      <p><strong>Member since:</strong> {{ profile.createdAt | date }}</p>

      <button
        class="edit-btn"
        (click)="editMode = true">
        ✏️ Edit Profile
      </button>

    </div>

  }

  @if (editMode) {

    <div class="edit-card">

      <h3>Edit Profile</h3>

      <input
        [(ngModel)]="updatedData.name"
        placeholder="Name" />

      <input
        [(ngModel)]="updatedData.phone"
        placeholder="Phone" />

      <label>Change Profile Picture</label>

      <input
        type="file"
        accept="image/*"
        (change)="onProfileImageSelected($event)" />

      @if (updatedData.profileImage) {

        <img
          [src]="updatedData.profileImage"
          class="preview-image" />

      }

      <div class="button-group">

        <button
          class="save-btn"
          (click)="saveProfile()">
          💾 Save
        </button>

        <button
          class="cancel-btn"
          (click)="editMode = false">
          Cancel
        </button>

      </div>

    </div>

  }

</div>

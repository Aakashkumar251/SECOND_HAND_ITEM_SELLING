<div style="max-width: 900px; margin: 30px auto; padding: 20px;">

  <h2>🛍️ Browse Items</h2>

  <!-- Search Bar -->
  <div>
    <input [(ngModel)]="this.keyword" placeholder="Search items..." />
    <button (click)="onSearch()">Search</button>
    <button (click)="loadProducts()">Clear</button>
  </div><br>
@if (message) {
  <p>{{ message }}</p>
}

<div style="display: flex; flex-wrap: wrap; gap: 20px;">

  @for (product of products; track product.id) {

    <div style="border: 1px solid #ccc; padding: 15px; width: 250px; border-radius: 8px;">

      @if (product.imageUrls?.length > 0) {
        <img
          [src]="product.imageUrls[0]"
          style="width: 100%; height: 150px; object-fit: cover;" />
      }

      <h3>{{ product.title }}</h3>
      <p>₹ {{ product.price }}</p>
      <p>📍 {{ product.location }}</p>
      <p>🏷️ {{ product.category }}</p>

      <a [routerLink]="['/product', product.id]">
        View Details
      </a>

    </div>

  }

</div>

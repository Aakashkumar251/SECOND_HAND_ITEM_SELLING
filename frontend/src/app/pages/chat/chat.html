<div class="chat-container">

  <div class="chat-header">
    <h2>💬 Messages</h2>
  </div>

  <div class="chat-body">

    <div class="message received">
      <p>Hello, is this item still available?</p>
      <span>10:15 AM</span>
    </div>

    <div class="message sent">
      <p>Yes, it's available.</p>
      <span>10:16 AM</span>
    </div>

    <div class="message received">
      <p>Can you share more photos?</p>
      <span>10:17 AM</span>
    </div>

  </div>

  <div class="chat-input">
    <input
      type="text"
      placeholder="Type a message..."
    />
    <button>Send</button>
  </div>

</div>

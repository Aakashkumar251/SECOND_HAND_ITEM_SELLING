<div style="max-width:800px; margin:40px auto; padding:20px;">
  <h2>❤️ My Wishlist</h2>

  @if (message) {
    <p>{{ message }}</p>
  }

  @if (items.length === 0) {
    <p>Your wishlist is empty.</p>
  }

  @for (item of items; track item.id) {
    <div
      style="border:1px solid #ccc; padding:15px; margin-bottom:15px;
             border-radius:8px; display:flex; gap:15px;">

      @if (item.imageUrls?.length > 0) {
        <img
          [src]="item.imageUrls[0]"
          style="width:100px; height:100px; object-fit:cover; border-radius:4px;" />
      }

      <div style="flex:1;">
        <h3>{{ item.title }}</h3>
        <p>₹ {{ item.price }} | 📍 {{ item.location }}</p>

        <a [routerLink]="['/product', item.id]">View Details</a>
        &nbsp;

        <button (click)="remove(item.id)" style="color:red;">
          🗑️ Remove
        </button>
      </div>
    </div>
  }
</div>
